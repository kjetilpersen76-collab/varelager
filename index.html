<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Varelager</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; overflow-x: hidden; }
.container { max-width: 500px; margin: 0 auto; padding: 10px; }
.hidden { display: none !important; }

.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-screen h1 { font-size: 2rem; margin-bottom: 10px; color: #00d4ff; }
.user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 20px; }
.user-card { background: #16213e; border: 2px solid #0f3460; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; }
.user-card:hover, .user-card.active { border-color: #00d4ff; background: #1a2a4a; }
.user-card .name { font-size: 1.1rem; font-weight: 600; }
.pin-display { background: #16213e; border: 2px solid #0f3460; border-radius: 12px; padding: 15px; width: 100%; max-width: 400px; text-align: center; margin-bottom: 15px; font-size: 1.5rem; letter-spacing: 10px; min-height: 50px; }
.pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 400px; margin-bottom: 15px; }
.pin-btn { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 18px; font-size: 1.3rem; color: #eee; cursor: pointer; transition: all 0.15s; }
.pin-btn:active { background: #00d4ff; color: #1a1a2e; }
.pin-btn.wide { grid-column: span 2; }
.login-actions { display: flex; gap: 10px; width: 100%; max-width: 400px; }

.btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #00d4ff; color: #1a1a2e; }
.btn-secondary { background: #16213e; color: #eee; border: 2px solid #0f3460; }
.btn-danger { background: #e94560; color: #fff; }
.btn-success { background: #0f9b6e; color: #fff; }
.btn-warning { background: #f39c12; color: #fff; }
.btn:active { transform: scale(0.97); opacity: 0.8; }

.app-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; margin-bottom: 10px; border-bottom: 2px solid #0f3460; }
.app-header h1 { font-size: 1.3rem; color: #00d4ff; }
.user-info { font-size: 0.85rem; color: #888; }
.logout-btn { background: #e94560; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }

.nav-tabs { display: flex; gap: 4px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
.nav-tab { flex: 1; min-width: 50px; background: #16213e; border: 2px solid #0f3460; border-radius: 8px; padding: 10px 3px; text-align: center; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; color: #fff; }
.nav-tab.active { background: #00d4ff; color: #1a1a2e; border-color: #00d4ff; font-weight: 600; }

.section { background: #16213e; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
.section-title { font-size: 1.1rem; color: #00d4ff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #eee; font-size: 1rem; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #00d4ff; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-row { display: flex; gap: 10px; margin-top: 15px; }
.btn-row .btn { flex: 1; }

.data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.data-table th { background: #0f3460; color: #00d4ff; padding: 8px; text-align: left; font-size: 0.8rem; }
.data-table td { padding: 8px; border-bottom: 1px solid #0f3460; }
.data-table tr:hover { background: #1a2a4a; }
.data-table .actions { display: flex; gap: 5px; }
.data-table .actions button { padding: 4px 8px; border: none; border-radius: 4px; font-size: 0.75rem; cursor: pointer; }
.edit-btn { background: #0f9b6e; color: #fff; }
.del-btn { background: #e94560; color: #fff; }

.kalk-display { background: #1a1a2e; border: 2px solid #0f3460; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 10px; font-size: 1.8rem; font-weight: 700; color: #00d4ff; min-height: 50px; letter-spacing: 2px; }
.kalk-letters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; justify-content: center; }
.kalk-letter-btn { background: #16213e; border: 2px solid #0f3460; border-radius: 8px; padding: 10px 14px; font-size: 1rem; font-weight: 700; color: #00d4ff; cursor: pointer; transition: all 0.15s; min-width: 40px; text-align: center; }
.kalk-letter-btn:hover, .kalk-letter-btn.active { background: #00d4ff; color: #1a1a2e; border-color: #00d4ff; }
.kalk-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
.kalk-num-btn { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 16px; font-size: 1.2rem; color: #eee; cursor: pointer; transition: all 0.15s; }
.kalk-num-btn:active { background: #00d4ff; color: #1a1a2e; }
.kalk-num-btn.wide { grid-column: span 2; }
.kalk-actions { display: flex; gap: 10px; }

.qr-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.qr-overlay video { max-width: 90%; max-height: 60%; border-radius: 12px; }
.qr-overlay .close-btn { position: absolute; top: 20px; right: 20px; background: #e94560; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; cursor: pointer; z-index: 1001; }
.qr-manual { background: #16213e; padding: 20px; border-radius: 12px; margin-top: 20px; width: 90%; max-width: 400px; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #0f9b6e; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 0.95rem; z-index: 2000; transition: transform 0.3s; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: #e94560; }
.toast.info { background: #3498db; }

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-content { background: #16213e; border-radius: 16px; padding: 20px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.modal-header h2 { color: #00d4ff; font-size: 1.2rem; }
.modal-close { background: none; border: none; color: #888; font-size: 1.5rem; cursor: pointer; }

.checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.checkbox-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: #00d4ff; }

.stat-box { background: #1a1a2e; border-radius: 8px; padding: 12px; text-align: center; }
.stat-box .value { font-size: 1.5rem; font-weight: 700; color: #00d4ff; }
.stat-box .label { font-size: 0.75rem; color: #888; margin-top: 4px; }

.info-box { background: #1a2a4a; border-left: 4px solid #00d4ff; padding: 12px; border-radius: 0 8px 8px 0; margin-bottom: 15px; font-size: 0.9rem; }
.info-box.warning { border-left-color: #f39c12; background: #4a3a1a; }
.info-box.error { border-left-color: #e94560; background: #4a1a2a; }

@media print {
  body { background: #fff; color: #000; font-family: Arial, sans-serif; }
  .app-header, .nav-tabs, .btn-row, .no-print { display: none !important; }
  .container { max-width: 100%; padding: 0; }
  .section { background: #fff; border: none; color: #000; padding: 0; margin-bottom: 20px; }
  .section-title { color: #000; font-size: 1.2rem; border-bottom: 2px solid #000; padding-bottom: 5px; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .data-table th { background: #0066cc; color: #fff; padding: 8px; text-align: left; border: 1px solid #333; }
  .data-table td { padding: 6px 8px; border-bottom: 1px solid #ccc; color: #000; }
  .data-table tr:hover { background: transparent; }
  .stat-box .value { color: #000; }
  .stat-box .label { color: #333; }
  .info-box { background: #fff; border-left: 3px solid #000; color: #000; }
  .info-box.warning { border-left-color: #f39c12; background: #fff; }
  .info-box.error { border-left-color: #e94560; background: #fff; }
}

::-webkit-scrollbar { width: 6px; height: 8px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #00d4ff; }
::-webkit-scrollbar-corner { background: #1a1a2e; }

.table-scroll-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 10px; }

input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
  cursor: pointer;
}

.order-btn { background: #16213e; border: 1px solid #0f3460; color: #00d4ff; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; margin: 0 2px; }
.order-btn:active { background: #00d4ff; color: #1a1a2e; }

.kontroll-container { min-width: 1200px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 10px; width: 100vw; margin-left: calc(-50vw + 50%); padding-left: 10px; padding-right: 10px; box-sizing: border-box; }
.kontroll-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
.kontroll-stat { background: #1a2a4a; border-radius: 10px; padding: 15px; text-align: center; }
.kontroll-stat .val { font-size: 1.4rem; font-weight: 700; color: #00d4ff; }
.kontroll-stat .lab { font-size: 0.8rem; color: #888; margin-top: 5px; }
.kontroll-filter { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 15px; }
.kontroll-filter .fg { display: flex; flex-direction: column; gap: 4px; }
.kontroll-filter .fg label { font-size: 0.8rem; color: #aaa; }
.kontroll-filter .fg input, .kontroll-filter .fg select { padding: 8px; border: 2px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #eee; font-size: 0.85rem; }
.kontroll-filter .fg select[multiple] { height: 100px; }
.kontroll-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.kontroll-table th { background: #0f3460; color: #00d4ff; padding: 8px 10px; text-align: left; font-weight: 600; white-space: nowrap; }
.kontroll-table td { padding: 6px 10px; border-bottom: 1px solid #0f3460; white-space: nowrap; }
.kontroll-table tr:hover { background: #1a2a4a; }
.kontroll-actions { display: flex; gap: 4px; }
.kontroll-actions button { padding: 3px 6px; border: none; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
.kontroll-edit { background: #0f9b6e; color: #fff; }
.kontroll-move { background: #f39c12; color: #fff; }
.kontroll-del { background: #e94560; color: #fff; }
</style>

<body>
<div id="app"></div>

<script>

// html5-qrcode loader
function loadHtml5Qrcode(callback) {
  if (typeof Html5Qrcode !== 'undefined') { if (callback) callback(); return; }
  var script = document.createElement('script');
  script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
  script.onload = function() { if (callback) callback(); };
  script.onerror = function() { showToast('QR-scanner ikke tilgjengelig', 'error'); };
  document.head.appendChild(script);
}

const CONFIG = { ADMIN_PASS: "admin1234", VERSION: "2.0.0" };

let LAGRE = ["Kjøpslager", "Sortert", "Produsert", "Slettet"];
let LEVERANDORER = ["Kjøllefjord", "Båtsfjord", "Berlevåg", "Nesseby"];
let STORRELSER = {
  "Kjøpslager": ["0-0,8 kg", "1,6-2,2 kg", "2,2-3,2 kg", "3,2+ kg", "Ho -2,2 kg", "Ho +2,2 kg", "Skada 2,2-3,2 kg", "Skada 3,2+ kg"],
  "Sortert": ["1,5-2 kg", "2-3 kg", "3-4 kg", "4+ kg", "Ho 0,8-2 kg", "Ho 2+ kg", "Skada 1,5-3 kg", "Skada 3+ kg"],
  "Produsert": []
};
let KG_I_BOX = {};

let DB = { users: [], items: [], settings: { gscriptUrl: "" }, customLagre: null, customLeverandorer: null, customStorrelser: null };
let currentUser = null, currentPin = "", selectedUserId = null;
let currentTab = "inn", editingItem = null, qrScanner = null;
let LAST_SYNC = null, SYNC_QUEUE = [], IS_SYNCING = false;
let currentRapSubTab = "total";
let kalkInput = "";
let selectedLetter = "";

function $(id) { return document.getElementById(id); }
function saveDB() { 
  localStorage.setItem("varelager_db", JSON.stringify(DB)); 
  // Auto-sync til Google Sheets hvis URL er satt
  if (DB.settings.gscriptUrl && !IS_SYNCING) {
    setTimeout(function() { syncToGScript(); }, 100);
  }
}
function loadDB() {
  const data = localStorage.getItem("varelager_db");
  if (data) { 
    DB = JSON.parse(data); 
    if (DB.customLagre) LAGRE = DB.customLagre;
    if (DB.customLeverandorer) LEVERANDORER = DB.customLeverandorer;
    if (DB.customStorrelser) STORRELSER = DB.customStorrelser;
    if (DB.kgIBox) KG_I_BOX = DB.kgIBox;
  }
  else { DB.users = [{ id: 1, name: "Admin", pin: "1234", isAdmin: true }]; saveDB(); }
}
function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
function formatDate(d) { const date = d ? new Date(d) : new Date(); return date.toISOString().split("T")[0]; }
function formatDateNo(d) { const date = d ? new Date(d) : new Date(); return date.toLocaleDateString("no-NO", { day: "2-digit", month: "2-digit", year: "2-digit" }); }
function formatDateTime(d) { const date = d ? new Date(d) : new Date(); return date.toLocaleString("no-NO", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" }); }
function formatNumber(n) { return n ? parseFloat(n).toFixed(1).replace(".", ",") : "0,0"; }
function parseNumber(s) { return parseFloat((s || "").toString().replace(",", ".")) || 0; }

function daysBetween(d1, d2) {
  const a = new Date(d1); a.setHours(0,0,0,0);
  const b = new Date(d2); b.setHours(0,0,0,0);
  return Math.floor((b - a) / (1000 * 60 * 60 * 24));
}

function showToast(msg, type) {
  const toast = document.createElement("div");
  toast.className = "toast " + (type || "success") + " show";
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 3000);
}

function init() { loadDB(); renderLogin(); }

// ===================== LOGIN =====================
function renderLogin() {
  const app = $("app");
  let usersHtml = "";
  DB.users.forEach(u => {
    usersHtml += `<div class="user-card ${selectedUserId === u.id ? 'active' : ''}" onclick="selectUser(${u.id})"><div class="name">${u.name}</div></div>`;
  });
  app.innerHTML = `<div class="login-screen"><h1>📦 Varelager <span style="font-size:0.7rem;color:#888;vertical-align:middle;margin-left:5px;">v${CONFIG.VERSION}</span></h1><div class="subtitle">v${CONFIG.VERSION}</div>` +
    `<div class="user-grid">${usersHtml}</div>` +
    `<div class="pin-display">${currentPin ? currentPin.replace(/./g, "●") : ""}</div>` +
    `<div class="pin-pad">` +
    `<button class="pin-btn" onclick="addPin(1)">1</button><button class="pin-btn" onclick="addPin(2)">2</button><button class="pin-btn" onclick="addPin(3)">3</button>` +
    `<button class="pin-btn" onclick="addPin(4)">4</button><button class="pin-btn" onclick="addPin(5)">5</button><button class="pin-btn" onclick="addPin(6)">6</button>` +
    `<button class="pin-btn" onclick="addPin(7)">7</button><button class="pin-btn" onclick="addPin(8)">8</button><button class="pin-btn" onclick="addPin(9)">9</button>` +
    `<button class="pin-btn wide" onclick="addPin(0)">0</button><button class="pin-btn" onclick="clearPin()">⌫</button>` +
    `</div>` +
    `<div class="login-actions"><button class="btn btn-primary" onclick="login()">Logg inn</button><button class="btn btn-secondary" onclick="showRegister()">Ny bruker</button></div>` +
    `</div>`;
}

function selectUser(id) { selectedUserId = id; currentPin = ""; renderLogin(); }
function addPin(n) { if (currentPin.length < 4) { currentPin += n; renderLogin(); } }
function clearPin() { currentPin = currentPin.slice(0, -1); renderLogin(); }

function login() {
  if (!selectedUserId) { showToast("Velg en bruker", "error"); return; }
  if (currentPin.length !== 4) { showToast("Tast inn 4 siffer", "error"); return; }
  const user = DB.users.find(u => u.id === selectedUserId && u.pin === currentPin);
  if (!user) { showToast("Feil pinkode", "error"); currentPin = ""; renderLogin(); return; }
  currentUser = user; currentPin = ""; selectedUserId = null;
  renderApp(); showToast("Velkommen " + user.name + "!");
}

function showRegister() {
  $("app").innerHTML = `<div class="login-screen"><h1>📝 Ny bruker</h1><div class="container" style="width:100%;max-width:400px;">` +
    `<div class="form-group"><label>Navn</label><input type="text" id="regName" placeholder="Ditt navn"></div>` +
    `<div class="form-group"><label>Pinkode (4 siffer)</label><input type="password" id="regPin1" placeholder="****" maxlength="4"></div>` +
    `<div class="form-group"><label>Bekreft pinkode</label><input type="password" id="regPin2" placeholder="****" maxlength="4"></div>` +
    `<div class="btn-row"><button class="btn btn-success" onclick="registerUser()">Registrer</button><button class="btn btn-secondary" onclick="renderLogin()">Avbryt</button></div>` +
    `</div></div>`;
}

function registerUser() {
  const name = $("regName").value.trim();
  const pin1 = $("regPin1").value;
  const pin2 = $("regPin2").value;
  if (!name) { showToast("Skriv inn navn", "error"); return; }
  if (!/^\d{4}$/.test(pin1)) { showToast("Pinkode må være 4 siffer", "error"); return; }
  if (pin1 !== pin2) { showToast("Pinkodene matcher ikke", "error"); return; }
  const newId = DB.users.length > 0 ? Math.max(...DB.users.map(u => u.id)) + 1 : 1;
  DB.users.push({ id: newId, name: name, pin: pin1, isAdmin: false });
  saveDB(); showToast("Bruker registrert!"); renderLogin();
}

function logout() { currentUser = null; currentTab = "inn"; currentRapSubTab = "total"; editingItem = null; kalkInput = ""; selectedLetter = ""; renderLogin(); }

// ===================== APP UI =====================
function renderApp() {
  const app = $("app");
  app.innerHTML = `<div class="container"><div class="app-header"><div><h1>📦 Varelager <span style="font-size:0.7rem;color:#888;vertical-align:middle;margin-left:5px;">v${CONFIG.VERSION}</span></h1><div class="user-info">${currentUser.name}</div></div><div style="display:flex;align-items:center;gap:10px;"><span id="syncIndicator" style="font-size:1.2rem;cursor:help;" title="Synkroniseringsstatus">○</span><button class="logout-btn" onclick="logout()">Logg ut</button></div></div>` +
    `<div class="nav-tabs">` +
    `<button class="nav-tab ${currentTab === "inn" ? "active" : ""}" onclick="switchTab('inn')">📥 INN</button>` +
    `<button class="nav-tab ${currentTab === "ut" ? "active" : ""}" onclick="switchTab('ut')">📤 UT</button>` +
    `<button class="nav-tab ${currentTab === "korr" ? "active" : ""}" onclick="switchTab('korr')">📝 Korr</button>` +
    `<button class="nav-tab ${currentTab === "rap" ? "active" : ""}" onclick="switchTab('rap')">📊 Rap</button>` +
    `<button class="nav-tab ${currentTab === "synk" ? "active" : ""}" onclick="switchTab('synk')">🔄 Synk</button>` +
    `<button class="nav-tab ${currentTab === "lager" ? "active" : ""}" onclick="switchTab('lager')">📦 Lager</button>` +
    `<button class="nav-tab ${currentTab === "inst" ? "active" : ""}" onclick="switchTab('inst')">⚙️ Inst</button>` +
    `</div><div id="tabContent"></div></div>`;
  renderTabContent();
}

function switchTab(tab) { currentTab = tab; editingItem = null; kalkInput = ""; selectedLetter = ""; renderApp(); }

function renderTabContent() {
  const content = $("tabContent");
  if (!content) return;
  switch(currentTab) {
    case "inn": renderInn(content); break;
    case "ut": renderUt(content); break;
    case "lager": renderLager(content); break;
    case "kontroll": renderKontroll(content); break;
    case "korr": renderKorr(content); break;
    case "rap": renderRap(content); break;
    case "synk": renderSynk(content); break;
    case "inst": renderInst(content); break;
  }
}

// ===================== INN =====================
function renderInn(content) {
  const now = new Date();
  const dateStr = now.toISOString().split("T")[0];
  const timeStr = now.toTimeString().slice(0, 5);
  content.innerHTML = `<div class="section"><div class="section-title">📥 Vare INN</div>` +
    `<div class="form-row"><div class="form-group"><label>Dato</label><input type="date" id="innDato" value="${dateStr}"></div>` +
    `<div class="form-group"><label>Klokkeslett</label><input type="time" id="innTid" value="${timeStr}"></div></div>` +
    `<div class="form-group"><label>Lager</label><select id="innLager" onchange="updateStorrelser()"><option value="">Velg lager...</option>${LAGRE.map(l => `<option value="${l}">${l}</option>`).join("")}</select></div>` +
    `<div class="form-group"><label>Leverandør</label><select id="innLev"><option value="">Velg leverandør...</option>${LEVERANDORER.map(l => `<option value="${l}">${l}</option>`).join("")}</select></div>` +
    `<div class="form-group"><label>Størrelse</label><select id="innStorrelse"><option value="">Velg størrelse...</option></select></div>` +
    `<div class="form-group"><label>Kar nr</label><input type="text" id="innKar" placeholder="F.eks. K-123"></div>` +
    `<div class="form-row"><div class="form-group"><label>Brutto kilo</label><input type="text" id="innBrutto" placeholder="0,0" oninput="calcNetto()"></div>` +
    `<div class="form-group"><label>Tara kilo</label><input type="text" id="innTara" placeholder="0,0" oninput="calcNetto()"></div></div>` +
    `<div class="form-group"><label>Netto kilo</label><input type="text" id="innNetto" placeholder="0,0" readonly style="background:#0f3460;"></div>` +
    `<div class="btn-row"><button class="btn btn-success" onclick="saveInn()">💾 Lagre</button><button class="btn btn-primary" onclick="saveInn(true)">📷 Scan QR & Lagre</button></div>` +
    `</div>`;
  updateStorrelser();
}

function updateStorrelser() {
  const lager = $("innLager") ? $("innLager").value : "";
  const sel = $("innStorrelse");
  if (!sel || !lager) return;
  const sizes = STORRELSER[lager] || [];
  sel.innerHTML = `<option value="">Velg størrelse...</option>${sizes.map(s => `<option value="${s}">${s}</option>`).join("")}`;
}

function calcNetto() {
  const brutto = parseNumber($("innBrutto").value);
  const tara = parseNumber($("innTara").value);
  const netto = Math.max(0, brutto - tara);
  $("innNetto").value = formatNumber(netto);
}

function saveInn(withQR) {
  const dato = $("innDato").value;
  const tid = $("innTid").value;
  const lager = $("innLager").value;
  const lev = $("innLev").value;
  const storrelse = $("innStorrelse").value;
  const kar = $("innKar").value.trim();
  const brutto = parseNumber($("innBrutto").value);
  const tara = parseNumber($("innTara").value);
  const netto = parseNumber($("innNetto").value);

  if (!lager || !lev || !storrelse) { showToast("Fyll ut alle obligatoriske felter", "error"); return; }
  if (kar && DB.items.some(i => i.kar === kar && !i.utDato)) { showToast("Advarsel: Kar nr finnes allerede!", "error"); }

  const item = {
    id: generateId(), qrId: withQR ? kar : "", kar: withQR ? "" : kar,
    dato: dato + "T" + tid, lager: lager, lev: lev, storrelse: storrelse,
    brutto: brutto, tara: tara, netto: netto, utDato: null, userInn: currentUser.name
  };

  DB.items.push(item); saveDB(); showToast("Vare lagret!");
  $("innKar").value = ""; $("innBrutto").value = ""; $("innTara").value = ""; $("innNetto").value = "";
  const now = new Date();
  $("innDato").value = now.toISOString().split("T")[0];
  $("innTid").value = now.toTimeString().slice(0, 5);
  if (withQR) { showToast("QR-kode lagret: " + item.qrId); }
}

// ===================== UT =====================
function renderUt(content) {
  content.innerHTML = `<div class="section"><div class="section-title">📤 Vare UT → Produsert</div>` +
    `<div class="form-group"><label>Scan QR-kode eller bruk kalkulator</label>` +
    `<div class="btn-row"><button class="btn btn-primary" onclick="startQRScan()">📷 Scan QR</button><button class="btn btn-secondary" onclick="showKalkulator()">📝 Tast inn pallenr.</button></div></div>` +
    `<div class="form-group"><label>Eller velg lager for oversikt</label>` +
    `<select id="utLagerOversikt" onchange="showLagerOversikt()"><option value="">Velg lager...</option>${LAGRE.filter(l => l !== "Produsert" && l !== "Slettet").map(l => `<option value="${l}">${l}</option>`).join("")}</select></div>` +
    `<div id="kalkulatorArea"></div>` +
    `<div id="utResult"></div></div>`;
}

function getUniqueLetters() {
  const letters = new Set();
  DB.items.forEach(i => {
    if (i.lager !== "Produsert" && i.kar && typeof i.kar === "string") {
      const match = i.kar.match(/^[A-Za-z]+/);
      if (match) letters.add(match[0].toUpperCase());
    }
  });
  return Array.from(letters).sort();
}

function showKalkulator() {
  selectedLetter = "";
  kalkInput = "";
  const letters = getUniqueLetters();
  let lettersHtml = '';
  letters.forEach(letter => {
    lettersHtml += `<button class="kalk-letter-btn ${selectedLetter === letter ? 'active' : ''}" data-letter="${letter}">${letter}</button>`;
  });

  $("kalkulatorArea").innerHTML = `<div class="section" style="margin-top:15px;">` +
    `<div class="section-title">📝 Tast inn pallenr.</div>` +
    `<div class="kalk-letters">${lettersHtml}</div>` +
    `<div class="kalk-display" id="kalkDisplay">${selectedLetter + kalkInput}</div>` +
    `<div class="kalk-pad">` +
    `<button class="kalk-num-btn" onclick="kalkAdd(1)">1</button><button class="kalk-num-btn" onclick="kalkAdd(2)">2</button><button class="kalk-num-btn" onclick="kalkAdd(3)">3</button>` +
    `<button class="kalk-num-btn" onclick="kalkAdd(4)">4</button><button class="kalk-num-btn" onclick="kalkAdd(5)">5</button><button class="kalk-num-btn" onclick="kalkAdd(6)">6</button>` +
    `<button class="kalk-num-btn" onclick="kalkAdd(7)">7</button><button class="kalk-num-btn" onclick="kalkAdd(8)">8</button><button class="kalk-num-btn" onclick="kalkAdd(9)">9</button>` +
    `<button class="kalk-num-btn wide" onclick="kalkAdd(0)">0</button><button class="kalk-num-btn" onclick="kalkBack()">⌫</button>` +
    `</div>` +
    `<div class="kalk-actions">` +
    `<button class="btn btn-success" onclick="kalkSearch()">OK (vare ut av lager)</button>` +
    `<button class="btn btn-secondary" onclick="kalkClear()">Tilbake</button>` +
    `</div></div>`;

  // Legg til event listeners for bokstav-knappene
  document.querySelectorAll('.kalk-letter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      selectKalkLetter(this.dataset.letter);
    });
  });
}

function selectKalkLetter(letter) {
  selectedLetter = letter;
  kalkInput = "";
  updateKalkDisplay();
  var buttons = document.querySelectorAll('.kalk-letter-btn');
  buttons.forEach(function(btn) {
    if (btn.dataset.letter === letter) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
}

function kalkAdd(n) {
  kalkInput += n;
  updateKalkDisplay();
}

function kalkBack() {
  kalkInput = kalkInput.slice(0, -1);
  updateKalkDisplay();
}

function kalkClear() {
  kalkInput = "";
  selectedLetter = "";
  updateKalkDisplay();
  $("utResult").innerHTML = "";
}

function updateKalkDisplay() {
  const disp = $("kalkDisplay");
  if (disp) disp.textContent = selectedLetter + kalkInput;
}

function kalkSearch() {
  const search = (selectedLetter + kalkInput).trim();
  if (!search) { showToast("Tast inn kar nr", "error"); return; }
  processUt(search);
}

function processUt(search) {
  const item = DB.items.find(i => {
    const karStr = i.kar ? String(i.kar) : "";
    const qrStr = i.qrId ? String(i.qrId) : "";
    return karStr.toLowerCase() === search.toLowerCase() || qrStr.toLowerCase() === search.toLowerCase();
  });
  if (!item) { showToast("Vare ikke funnet", "error"); return; }
  if (item.lager === "Produsert") { showToast("Vare er allerede produsert", "error"); return; }

  $("utResult").innerHTML = `<div class="section" style="margin-top:15px;"><div class="section-title">Vare funnet</div>` +
    `<p><strong>Kar:</strong> ${item.kar || "N/A"}</p><p><strong>QR:</strong> ${item.qrId || "N/A"}</p>` +
    `<p><strong>Lager:</strong> ${item.lager}</p><p><strong>Størrelse:</strong> ${item.storrelse}</p>` +
    `<p><strong>Netto:</strong> ${formatNumber(item.netto)} kg</p><p><strong>Inn dato:</strong> ${formatDateNo(item.dato)}</p>` +
    `<div class="info-box warning" style="margin-top:10px;">Varen vil flyttes til <strong>Produsert</strong></div>` +
    `<div class="btn-row"><button class="btn btn-success" onclick="confirmUt('${item.id}')">✅ Flytt til Produsert</button>` +
    `<button class="btn btn-danger" onclick="document.getElementById('utResult').innerHTML=''">Avbryt</button></div></div>`;
}

function confirmUt(id) {
  const item = DB.items.find(i => i.id === id);
  if (!item) return;
  item.lager = "Produsert";
  item.utDato = new Date().toISOString();
  item.userUt = currentUser.name;
  saveDB(); showToast("Vare flyttet til Produsert!"); $("utResult").innerHTML = "";
  if ($("utLagerOversikt") && $("utLagerOversikt").value) showLagerOversikt();
}

function showLagerOversikt() {
  const lager = $("utLagerOversikt").value;
  if (!lager) { $("utResult").innerHTML = ""; return; }
  const items = DB.items.filter(i => i.lager === lager);

  let html = `<div class="section" style="margin-top:15px;"><div class="section-title">${lager} (${items.length} varer)</div>` +
    `<table class="data-table"><thead><tr><th>Kar</th><th>Størrelse</th><th>Netto</th><th>Dato</th><th>Velg</th></tr></thead><tbody>`;
  items.forEach(item => {
    html += `<tr><td>${item.kar || "N/A"}</td><td>${item.storrelse}</td><td>${formatNumber(item.netto)}</td><td>${formatDateNo(item.dato)}</td>` +
      `<td><input type="checkbox" class="bulk-ut" data-id="${item.id}"></td></tr>`;
  });
  html += `</tbody></table><div class="btn-row" style="margin-top:10px;"><button class="btn btn-success" onclick="bulkUt()">Flytt valgte til Produsert</button></div></div>`;
  $("utResult").innerHTML = html;
}

function bulkUt() {
  const checkboxes = document.querySelectorAll(".bulk-ut:checked");
  if (checkboxes.length === 0) { showToast("Ingen varer valgt", "error"); return; }
  const ids = Array.from(checkboxes).map(cb => cb.dataset.id);
  ids.forEach(id => {
    const item = DB.items.find(i => i.id === id);
    if (item) { item.lager = "Produsert"; item.utDato = new Date().toISOString(); item.userUt = currentUser.name; }
  });
  saveDB(); showToast(ids.length + " varer flyttet til Produsert!"); showLagerOversikt();
}

// ===================== KONTROLL =====================
function renderKontroll(content) {
  content.innerHTML = `<div class="kontroll-container">` +
    `<div class="section-title">📋 Lagerkontroll</div>` +
    `<div class="kontroll-stats">` +
    `<div class="kontroll-stat"><div class="val" id="kTotLager">0</div><div class="lab">Totalt kilo hele lager</div></div>` +
    `<div class="kontroll-stat"><div class="val" id="kTotProd">0</div><div class="lab">Totalt produsert</div></div>` +
    `<div class="kontroll-stat"><div class="val" id="kFilLager">0</div><div class="lab">Filtrert lager</div></div>` +
    `<div class="kontroll-stat"><div class="val" id="kFilProd">0</div><div class="lab">Filtrert produsert</div></div></div>` +
    `<div class="section" style="margin-bottom:15px;">` +
    `<div class="kontroll-filter">` +
    `<div class="fg"><label>Dato fra</label><input type="date" id="kFra"></div>` +
    `<div class="fg"><label>Dato til</label><input type="date" id="kTil"></div>` +
    `<div class="fg"><label>År</label><select id="kAr"><option value="">Alle</option></select></div>` +
    `<div class="fg"><label>Måned</label><select id="kManed"><option value="">Alle</option><option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option><option value="4">Apr</option><option value="5">Mai</option><option value="6">Jun</option><option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option><option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option></select></div>` +
    `<div class="fg"><label>Uke</label><select id="kUke"><option value="">Alle</option></select></div>` +
    `<div class="fg"><label>Dag</label><select id="kDag"><option value="">Alle</option><option value="1">Man</option><option value="2">Tir</option><option value="3">Ons</option><option value="4">Tor</option><option value="5">Fre</option><option value="6">Lør</option><option value="7">Søn</option></select></div>` +
    `<div class="fg"><label>Lager</label><select id="kLager" multiple>${LAGRE.map(function(l) { return `<option value="${l}">${l}</option>`; }).join("")}</select></div>` +
    `<div class="fg"><label>Størrelse</label><select id="kStorrelse" multiple></select></div>` +
    `<div class="fg"><label>Leverandør</label><select id="kLev" multiple>${LEVERANDORER.map(function(l) { return `<option value="${l}">${l}</option>`; }).join("")}</select></div>` +
    `<div class="fg" style="justify-content:flex-end;"><button class="btn btn-primary" onclick="kontrollFilter()" style="width:100%;margin-top:auto;">🔍 Bruk filter</button></div>` +
    `</div></div>` +
    `<div class="section" style="margin-bottom:15px;">` +
    `<div class="btn-row" style="justify-content:flex-end;">` +
    `<button class="btn btn-warning" onclick="masseFlytt()" style="margin-right:8px;">📦 Masse flytting</button>` +
    `<button class="btn btn-danger" onclick="masseSlett()">🗑️ Masse sletting</button></div></div>` +
    `<div class="section"><div class="table-scroll-wrapper"><div class="table-wrap">` +
    `<table class="kontroll-table"><thead><tr>` +
    `<th><input type="checkbox" id="kSelectAll" onclick="kontrollToggleAll()"></th>` +
    `<th>ID</th><th>QR ID</th><th>Kar nr</th><th>Dato</th><th>Lager</th><th>Leverandør</th><th>Størrelse</th>` +
    `<th>Brutto</th><th>Tara</th><th>Netto</th><th>Ut dato</th><th>Registrert av</th><th>Handling</th></tr></thead>` +
    `<tbody id="kTable"></tbody></table></div></div>` +
    `<div id="kEmpty" class="empty" style="display:none">Ingen varer</div></div></div>`;

  var ukeSel = $("kUke");
  for (var i = 1; i <= 52; i++) {
    ukeSel.innerHTML += `<option value="${i}">Uke ${i}</option>`;
  }

  var stSel = $("kStorrelse");
  var alleSt = new Set();
  Object.values(STORRELSER).forEach(function(arr) { arr.forEach(function(s) { alleSt.add(s); }); });
  Array.from(alleSt).sort().forEach(function(s) {
    stSel.innerHTML += `<option value="${s}">${s}</option>`;
  });

  var arSel = $("kAr");
  var years = new Set();
  DB.items.forEach(function(i) { years.add(new Date(i.dato).getFullYear()); });
  Array.from(years).sort().reverse().forEach(function(y) {
    arSel.innerHTML += `<option value="${y}">${y}</option>`;
  });

  kontrollUpdateStats(DB.items);
  kontrollRender(DB.items);
}

function kontrollUpdateStats(items) {
  var lager = items.filter(function(i) { return i.lager !== "Produsert"; });
  var prod = items.filter(function(i) { return i.lager === "Produsert"; });
  $("kTotLager").textContent = formatNumber(lager.reduce(function(s, i) { return s + i.netto; }, 0)) + " kg";
  $("kTotProd").textContent = formatNumber(prod.reduce(function(s, i) { return s + i.netto; }, 0)) + " kg";
  $("kFilLager").textContent = formatNumber(lager.reduce(function(s, i) { return s + i.netto; }, 0)) + " kg";
  $("kFilProd").textContent = formatNumber(prod.reduce(function(s, i) { return s + i.netto; }, 0)) + " kg";
}

function kontrollFilter() {
  var fra = $("kFra").value;
  var til = $("kTil").value;
  var ar = $("kAr").value;
  var maned = $("kManed").value;
  var uke = $("kUke").value;
  var dag = $("kDag").value;
  var lagerValgt = Array.from($("kLager").selectedOptions).map(function(o) { return o.value; });
  var storrelseValgt = Array.from($("kStorrelse").selectedOptions).map(function(o) { return o.value; });
  var levValgt = Array.from($("kLev").selectedOptions).map(function(o) { return o.value; });

  var filtrert = DB.items.filter(function(i) {
    var d = new Date(i.dato);
    if (fra && d < new Date(fra)) return false;
    if (til && d > new Date(til + "T23:59:59")) return false;
    if (ar && d.getFullYear() !== parseInt(ar)) return false;
    if (maned && d.getMonth() + 1 !== parseInt(maned)) return false;
    if (uke) {
      var onejan = new Date(d.getFullYear(), 0, 1);
      var ukeNr = Math.ceil((((d - onejan) / 86400000) + onejan.getDay() + 1) / 7);
      if (ukeNr !== parseInt(uke)) return false;
    }
    if (dag && d.getDay() !== (parseInt(dag) % 7)) return false;
    if (lagerValgt.length > 0 && !lagerValgt.includes(i.lager)) return false;
    if (storrelseValgt.length > 0 && !storrelseValgt.includes(i.storrelse)) return false;
    if (levValgt.length > 0 && !levValgt.includes(i.lev)) return false;
    return true;
  });

  var lagerFil = filtrert.filter(function(i) { return i.lager !== "Produsert"; });
  var prodFil = filtrert.filter(function(i) { return i.lager === "Produsert"; });
  $("kFilLager").textContent = formatNumber(lagerFil.reduce(function(s, i) { return s + i.netto; }, 0)) + " kg";
  $("kFilProd").textContent = formatNumber(prodFil.reduce(function(s, i) { return s + i.netto; }, 0)) + " kg";

  kontrollRender(filtrert);
}

function kontrollRender(items) {
  var tbody = $("kTable");
  var empty = $("kEmpty");
  if (items.length === 0) { tbody.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  tbody.innerHTML = items.map(function(i) {
    return `<tr>` +
      `<td><input type="checkbox" class="k-select" data-id="${i.id}"></td>` +
      `<td>${i.id}</td>` +
      `<td>${i.qrId || ""}</td>` +
      `<td>${i.kar || ""}</td>` +
      `<td>${formatDateNo(i.dato)}</td>` +
      `<td>${i.lager}</td>` +
      `<td>${i.lev}</td>` +
      `<td>${i.storrelse}</td>` +
      `<td>${formatNumber(i.brutto)}</td>` +
      `<td>${formatNumber(i.tara)}</td>` +
      `<td>${formatNumber(i.netto)}</td>` +
      `<td>${i.utDato ? formatDateNo(i.utDato) : ""}</td>` +
      `<td>${i.userInn || ""}</td>` +
      `<td class="kontroll-actions">` +
        `<button class="kontroll-edit" onclick="kontrollEdit('${i.id}')">✏️</button>` +
        `<button class="kontroll-move" onclick="kontrollMove('${i.id}')">📦</button>` +
        `<button class="kontroll-del" onclick="kontrollDel('${i.id}')">🗑️</button></td></tr>`;
  }).join("");
}

function kontrollToggleAll() {
  var allCb = $("kSelectAll");
  var cbs = document.querySelectorAll(".k-select");
  cbs.forEach(function(cb) { cb.checked = allCb.checked; });
}

function getSelectedKontrollIds() {
  var cbs = document.querySelectorAll(".k-select:checked");
  return Array.from(cbs).map(function(cb) { return cb.dataset.id; });
}

function masseFlytt() {
  var ids = getSelectedKontrollIds();
  if (ids.length === 0) { showToast("Ingen varer valgt", "error"); return; }

  var lagerButtons = LAGRE.map(function(l, idx) {
    var style = l === "Produsert" ? "background:#0f9b6e;" : "";
    return `<button class="btn btn-secondary" style="margin:5px;width:100%;${style}" onclick="bekreftMasseFlytt('${ids.join(",")}',${idx})">${l}</button>`;
  }).join("");

  showModal("Masse flytting - " + ids.length + " varer valgt", 
    `<div class="form-group"><p>Velg lager å flytte til:</p></div>` +
    `<div style="display:flex;flex-direction:column;gap:5px;">${lagerButtons}</div>` +
    `<div class="btn-row" style="margin-top:15px;"><button class="btn btn-secondary" onclick="closeModal()">Avbryt</button></div>`);
}

function bekreftMasseFlytt(idsStr, idx) {
  if (!confirm("Er du sikker på at du vil flytte de markerte varene?")) return;
  var ids = idsStr.split(",");
  var lager = LAGRE[idx];
  ids.forEach(function(id) {
    var item = DB.items.find(function(i) { return i.id === id; });
    if (item) {
      item.lager = lager;
      if (item.lager === "Produsert") { item.utDato = new Date().toISOString(); }
      else { item.utDato = null; }
    }
  });
  saveDB(); showToast(ids.length + " varer flyttet til " + lager + "!"); closeModal(); kontrollFilter();
}

function masseSlett() {
  var ids = getSelectedKontrollIds();
  if (ids.length === 0) { showToast("Ingen varer valgt", "error"); return; }
  if (!confirm("Er du sikker på at du vil slette de markerte varene?")) return;
  ids.forEach(function(id) {
    var item = DB.items.find(function(i) { return i.id === id; });
    if (item) { item.lager = "Slettet"; item.utDato = new Date().toISOString(); }
  });
  saveDB(); showToast(ids.length + " varer flyttet til Slettet!"); closeModal(); kontrollFilter();
}

function kontrollEdit(id) {
  var item = DB.items.find(function(i) { return i.id === id; });
  if (!item) return;
  showModal("Rediger vare", 
    `<div class="form-group"><label>Kar nr</label><input type="text" id="kEditKar" value="${item.kar || ""}"></div>` +
    `<div class="form-group"><label>Lager</label><select id="kEditLager">${LAGRE.map(function(l) { return `<option ${l === item.lager ? 'selected' : ''}>${l}</option>`; }).join("")}</select></div>` +
    `<div class="form-group"><label>Leverandør</label><select id="kEditLev">${LEVERANDORER.map(function(l) { return `<option ${l === item.lev ? 'selected' : ''}>${l}</option>`; }).join("")}</select></div>` +
    `<div class="form-group"><label>Størrelse</label><input type="text" id="kEditStorrelse" value="${item.storrelse}"></div>` +
    `<div class="form-row"><div class="form-group"><label>Brutto</label><input type="text" id="kEditBrutto" value="${formatNumber(item.brutto)}"></div>` +
    `<div class="form-group"><label>Tara</label><input type="text" id="kEditTara" value="${formatNumber(item.tara)}"></div></div>` +
    `<div class="form-group"><label>Netto</label><input type="text" id="kEditNetto" value="${formatNumber(item.netto)}" readonly></div>` +

function kontrollSaveEdit(id) {
  var item = DB.items.find(function(i) { return i.id === id; });
  if (!item) return;
  item.kar = $("kEditKar").value;
  item.lager = $("kEditLager").value;
  item.lev = $("kEditLev").value;
  item.storrelse = $("kEditStorrelse").value;
  item.brutto = parseNumber($("kEditBrutto").value);
  item.tara = parseNumber($("kEditTara").value);
  item.netto = item.brutto - item.tara;
  saveDB(); closeModal(); showToast("Vare oppdatert!"); kontrollFilter();
}

function kontrollMove(id) {
  var item = DB.items.find(function(i) { return i.id === id; });
  if (!item) return;

  var lagerButtons = LAGRE.map(function(l, idx) {
    var style = l === "Produsert" ? "background:#0f9b6e;" : "";
    return `<button class="btn btn-secondary" style="margin:5px;width:100%;${style}" onclick="executeMove('${id}',${idx})">${l}</button>`;
  }).join("");

  showModal("Velg lager du vil flytte pallen til:", 
    `<div class="form-group"><p><strong>Kar:</strong> ${item.kar || "N/A"}</p><p><strong>Nåværende lager:</strong> ${item.lager}</p></div>` +
    `<div style="display:flex;flex-direction:column;gap:5px;">${lagerButtons}</div>` +
    `<div class="btn-row" style="margin-top:15px;"><button class="btn btn-secondary" onclick="closeModal()">Avbryt</button></div>`);
}

function executeMove(id, idx) {
  var item = DB.items.find(function(i) { return i.id === id; });
  if (!item) return;
  item.lager = LAGRE[idx];
  if (item.lager === "Produsert") { item.utDato = new Date().toISOString(); }
  else { item.utDato = null; }
  saveDB(); closeModal(); showToast("Flyttet til " + item.lager); kontrollFilter();
}

function kontrollDel(id) {
  if (!confirm("Sikker på at du vil slette?")) return;
  var pass = prompt("Admin-passord:");
  if (pass !== CONFIG.ADMIN_PASS) { showToast("Feil passord", "error"); return; }
  DB.items = DB.items.filter(function(i) { return i.id !== id; });
  saveDB(); showToast("Slettet!"); kontrollFilter();
}

function renderKorr(content) {
  content.innerHTML = `<div class="section"><div class="section-title">📝 Korreksjon</div>` +
    `<div class="form-row"><div class="form-group"><label>Dato fra</label><input type="date" id="korrFra"></div>` +
    `<div class="form-group"><label>Dato til</label><input type="date" id="korrTil"></div></div>` +
    `<div class="form-row"><div class="form-group"><label>Lager</label><select id="korrLager"><option value="">Alle</option>${LAGRE.filter(l => l !== "Slettet").map(l => `<option value="${l}">${l}</option>`).join("")}</select></div>` +
    `<div class="form-group"><label>Størrelse</label><select id="korrStorrelse"><option value="">Alle</option></select></div></div>` +
    `<div class="form-group"><label>Leverandør</label><select id="korrLev"><option value="">Alle</option>${LEVERANDORER.map(l => `<option value="${l}">${l}</option>`).join("")}</select></div>` +
    `<div class="checkbox-row"><input type="checkbox" id="korrVisProd"><label for="korrVisProd">Vis produserte varer</label></div>` +
    `<div class="btn-row"><button class="btn btn-primary" onclick="filterKorr()">🔍 Søk</button><button class="btn btn-secondary" onclick="clearKorrFilter()">Nullstill</button></div></div>` +
    `<div id="korrResult"></div>`;
}

function filterKorr() {
  const fra = $("korrFra").value;
  const til = $("korrTil").value;
  const lager = $("korrLager").value;
  const storrelse = $("korrStorrelse").value;
  const lev = $("korrLev").value;
  const visProd = $("korrVisProd").checked;

  let items = DB.items.filter(i => {
    const d = new Date(i.dato);
    if (fra && d < new Date(fra)) return false;
    if (til && d > new Date(til + "T23:59:59")) return false;
    if (lager && i.lager !== lager) return false;
    if (storrelse && i.storrelse !== storrelse) return false;
    if (lev && i.lev !== lev) return false;
    if (!visProd && i.lager === "Produsert") return false;
    return true;
  }).sort((a, b) => new Date(b.dato) - new Date(a.dato));

  let totalNetto = items.reduce((sum, i) => sum + i.netto, 0);

  let html = `<div class="section"><div class="section-title">Resultater (${items.length}) <span style="margin-left:auto;color:#00d4ff;">${formatNumber(totalNetto)} kg totalt</span></div>` +
    `<table class="data-table"><thead><tr><th>Dato</th><th>Lager</th><th>Kar</th><th>Størrelse</th><th>Netto</th><th>Handling</th></tr></thead><tbody>`;
  items.forEach(item => {
    html += `<tr><td>${formatDateNo(item.dato)}</td><td>${item.lager}</td><td>${item.kar || "N/A"}</td><td>${item.storrelse}</td><td>${formatNumber(item.netto)}</td>` +
      `<td class="actions"><button class="edit-btn" onclick="editItem('${item.id}')">✏️</button><button class="del-btn" onclick="deleteItem('${item.id}')">🗑️</button></td></tr>`;
  });
  html += `</tbody></table></div>`;
  $("korrResult").innerHTML = html;
}

function clearKorrFilter() {
  $("korrFra").value = ""; $("korrTil").value = ""; $("korrLager").value = "";
  $("korrStorrelse").value = ""; $("korrLev").value = ""; $("korrVisProd").checked = false;
  $("korrResult").innerHTML = "";
}

function editItem(id) {
  const item = DB.items.find(i => i.id === id);
  if (!item) return; editingItem = item;

  showModal("Rediger vare", 
    `<div class="form-group"><label>Dato</label><input type="datetime-local" id="editDato" value="${item.dato.slice(0, 16)}"></div>` +
    `<div class="form-group"><label>Lager</label><select id="editLager">${LAGRE.map(l => `<option value="${l}" ${l===item.lager?'selected':''}>${l}</option>`).join("")}</select></div>` +
    `<div class="form-group"><label>Leverandør</label><select id="editLev">${LEVERANDORER.map(l => `<option value="${l}" ${l===item.lev?'selected':''}>${l}</option>`).join("")}</select></div>` +
    `<div class="form-group"><label>Størrelse</label><input type="text" id="editStorrelse" value="${item.storrelse}"></div>` +
    `<div class="form-group"><label>Kar nr</label><input type="text" id="editKar" value="${item.kar || ''}"></div>` +

function saveEdit() {
  if (!editingItem) return;
  editingItem.dato = $("editDato").value;

  editingItem.lev = $("editLev").value;

function showRapTotal() {
  var items = DB.items.filter(function(i) { return i.lager !== "Produsert" && i.lager !== "Slettet"; });

function showLagreAdmin() {

    `<table class="data-table"><thead><tr><th>Navn</th><th>Handling</th></tr></thead><tbody>`;

    html += `<tr><td>${l}</td><td class="actions">`;

function renameLager(idx) {
  const pass = prompt("Admin-passord for å endre navn:");
  if (pass !== CONFIG.ADMIN_PASS) { showToast("Feil passord", "error"); return; }
  const gammeltNavn = LAGRE[idx];
  const nyttNavn = prompt("Nytt navn for lager \"" + gammeltNavn + "\":", gammeltNavn);
  if (!nyttNavn || nyttNavn.trim() === "" || nyttNavn === gammeltNavn) return;
  if (LAGRE.includes(nyttNavn)) { showToast("Navnet finnes allerede", "error"); return; }
  DB.items.forEach(i => { if (i.lager === gammeltNavn) i.lager = nyttNavn; });
  STORRELSER[nyttNavn] = STORRELSER[gammeltNavn] || [];
  delete STORRELSER[gammeltNavn];
  LAGRE[idx] = nyttNavn;
  DB.customLagre = LAGRE;
  DB.customStorrelser = STORRELSER;
  saveDB(); showToast("Lager endret!"); showLagreAdmin();
}

function addLager() {
  const navn = $("nyttLager").value.trim();
  if (!navn) { showToast("Skriv inn lager-navn", "error"); return; }
  if (LAGRE.includes(navn)) { showToast("Lager finnes allerede", "error"); return; }
  LAGRE.push(navn);
  STORRELSER[navn] = [];
  DB.customLagre = LAGRE;
  DB.customStorrelser = STORRELSER;
  saveDB(); showToast("Lager lagt til!"); showLagreAdmin();
}

function deleteLager(idx) {
  const pass = prompt('Admin-passord for å slette lager "' + LAGRE[idx] + '":');

  const lager = LAGRE[idx];

  DB.customLagre = LAGRE;

}

function showStorrelserForLager() {
  const lager = $("adminLager").value;
  const sizes = STORRELSER[lager] || [];

  let html = `<table class="data-table"><thead><tr><th>Rekkefølge</th><th>Størrelse</th><th>Kg i box</th><th>Handling</th></tr></thead><tbody>`;
  sizes.forEach((s, idx) => {
    const kgBox = KG_I_BOX[lager + "_" + s] || "";
    html += `<tr><td>` +
      `<button class="order-btn" onclick="moveStorrelseUp('${lager}',${idx})" ${idx === 0 ? 'disabled style="opacity:0.3"' : ''}>▲</button>` +
      `<button class="order-btn" onclick="moveStorrelseDown('${lager}',${idx})" ${idx === sizes.length - 1 ? 'disabled style="opacity:0.3"' : ''}>▼</button>` +
      `</td><td>${s}</td>` +
      `<td><input type="text" id="kgBox_${idx}" value="${kgBox}" placeholder="0,0" style="width:80px;padding:4px;background:#1a1a2e;border:1px solid #0f3460;border-radius:4px;color:#eee;text-align:center;" onchange="saveKgIBox('${lager}','${s}',${idx})"></td>` +
      `<td class="actions"><button class="del-btn" onclick="deleteStorrelse('${lager}',${idx})">🗑️</button></td></tr>`;
  });
  html += `</tbody></table>` +
    `<div class="form-group" style="margin-top:15px;"><label>Legg til ny størrelse for ${lager}</label>` +
    `<input type="text" id="nyStorrelse" placeholder="F.eks. 2-3 kg"></div>` +
    `<button class="btn btn-success" onclick="addStorrelse()">➕ Legg til</button>`;
  $("storrelserForLager").innerHTML = html;
}

function saveKgIBox(lager, storrelse, idx) {
  const val = $("kgBox_" + idx).value.replace(",", ".");
  const num = parseFloat(val);
  if (!isNaN(num) && num > 0) {
    KG_I_BOX[lager + "_" + storrelse] = num.toFixed(1).replace(".", ",");
  } else {
    delete KG_I_BOX[lager + "_" + storrelse];
  }
  DB.kgIBox = KG_I_BOX;
  saveDB();
  showToast("Kg i box lagret!");
}

function moveStorrelseUp(lager, idx) {
  if (idx === 0) return;
  const sizes = STORRELSER[lager];
  const temp = sizes[idx]; sizes[idx] = sizes[idx - 1]; sizes[idx - 1] = temp;
  DB.customStorrelser = STORRELSER;
  saveDB(); showStorrelserForLager();
}

function moveStorrelseDown(lager, idx) {
  const sizes = STORRELSER[lager];
  if (idx >= sizes.length - 1) return;
  const temp = sizes[idx]; sizes[idx] = sizes[idx + 1]; sizes[idx + 1] = temp;
  DB.customStorrelser = STORRELSER;
  saveDB(); showStorrelserForLager();
}

function addStorrelse() {
  const lager = $("adminLager").value;
  const storrelse = $("nyStorrelse").value.trim();
  if (!storrelse) { showToast("Skriv inn størrelse", "error"); return; }
  if (!STORRELSER[lager]) STORRELSER[lager] = [];
  if (STORRELSER[lager].includes(storrelse)) { showToast("Størrelse finnes allerede", "error"); return; }
  STORRELSER[lager].push(storrelse);
  DB.customStorrelser = STORRELSER;
  saveDB(); showToast("Størrelse lagt til!"); showStorrelserForLager();
}

function deleteStorrelse(lager, idx) {
  const pass = prompt("Admin-passord:");
  if (pass !== CONFIG.ADMIN_PASS) { showToast("Feil passord", "error"); return; }
  const s = STORRELSER[lager][idx];
  const harVarer = DB.items.some(i => i.lager === lager && i.storrelse === s);
  if (harVarer && !confirm("ADVARSEL: Denne størrelsen har tilknyttede varer. Vil du likevel slette?")) return;
  STORRELSER[lager].splice(idx, 1);
  DB.customStorrelser = STORRELSER;
  saveDB(); showToast("Størrelse slettet!"); showStorrelserForLager();
}

function backgroundSync() {
  if (!DB.settings.gscriptUrl || IS_SYNCING) return;
  IS_SYNCING = true;
  updateSyncIndicator('syncing');
  fetchFromGScript(true);
}

function updateSyncIndicator(status) {
  const indicator = document.getElementById('syncIndicator');
  if (!indicator) return;
  if (status === 'ok') indicator.textContent = '✅';
  else if (status === 'error') indicator.textContent = '❌';
  else if (status === 'syncing') indicator.textContent = '🔄';
  else indicator.textContent = '○';
}

    `<div class="info-box">` +
    `<strong>📘 Oppsett:</strong><br>1. Opprett Google Apps Script<br>2. Lim inn koden nedenfor<br>3. Deploy som web app<br>4. Lim inn URL her` +
    `</div>` +
    `<div class="form-group"><label>Google Apps Script URL</label>` +
    `<input type="text" id="gscriptUrl" value="${DB.settings.gscriptUrl || ''}" placeholder="https://script.google.com/macros/s/.../exec"></div>` +

    `<div class="section-title">📊 Google Regneark</div>` +

    `<button class="btn btn-secondary" style="margin-top:8px;width:100%;" onclick="copyGScriptCode()">📋 Kopier kode</button></div></div>`;

function getGScriptCode() {
  return `function doGet(e) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();\n  var action = e.parameter.action;\n  var callback = e.parameter.callback;\n  var result;\n  if (action === "read") {\n    var data = sheet.getDataRange().getValues();\n    result = {success: true, data: data};\n  }\n  else if (action === "write") {\n    var jsonData = e.parameter.data;\n    var items = JSON.parse(jsonData);\n    sheet.clear();\n    var headers = ["ID", "QR ID", "Kar nr", "Dato", "Lager", "Leverandør", "Størrelse", "Brutto", "Tara", "Netto", "Ut dato", "Registrert av"];\n    sheet.appendRow(headers);\n    items.forEach(function(row) {\n      sheet.appendRow([row.id, row.qrId || "", row.kar || "", row.dato, row.lager, row.lev, row.storrelse, row.brutto, row.tara, row.netto, row.utDato || "", row.userInn || ""]);\n    });\n    result = {success: true, count: items.length};\n  }\n  else {\n    var data = sheet.getDataRange().getValues();\n    result = data;\n  }\n  var output = ContentService.createTextOutput(callback + "(" + JSON.stringify(result) + ");");\n  output.setMimeType(ContentService.MimeType.JAVASCRIPT);\n  return output;\n}\nfunction doOptions(e) {\n  return ContentService.createTextOutput("")\n    .setHeaders({\n      'Access-Control-Allow-Origin': '*',\n      'Access-Control-Allow-Methods': 'GET, POST, OPTIONS',\n      'Access-Control-Allow-Headers': 'Content-Type'\n    });\n}`;
}

function copyGScriptCode() {
  navigator.clipboard.writeText(getGScriptCode()).then(() => showToast("Kode kopiert!"));
}

function saveGScriptUrl() {
  DB.settings.gscriptUrl = $("gscriptUrl").value.trim();

}

function syncToGScript() {
  if (!DB.settings.gscriptUrl || IS_SYNCING) return;
  IS_SYNCING = true;
  updateSyncIndicator('syncing');

  var url = DB.settings.gscriptUrl;
  var jsonData = JSON.stringify(DB.items);

  // Hvis for mye data, bruk batching eller skip
  if (jsonData.length > 7000) {
    console.log('For mye data for auto-sync, bruk manuell sync');
    IS_SYNCING = false;
    updateSyncIndicator('error');
    return;
  }

  var script = document.createElement("script");
  var callbackName = "gscriptSyncCallback_" + Date.now();
  window[callbackName] = function(data) {
    delete window[callbackName];
    if (script.parentNode) script.parentNode.removeChild(script);
    if (data && data.success) {
      LAST_SYNC = new Date();
      updateSyncIndicator('ok');
      console.log('Auto-sync OK: ' + data.count + ' rader');
    } else {
      updateSyncIndicator('error');
      console.log('Auto-sync feilet');
    }
    IS_SYNCING = false;
  };
  script.onerror = function() {
    delete window[callbackName];
    if (script.parentNode) script.parentNode.removeChild(script);
    updateSyncIndicator('error');
    IS_SYNCING = false;
  };
  script.src = url + "?action=write&data=" + encodeURIComponent(jsonData) + "&callback=" + callbackName;
  document.head.appendChild(script);
  setTimeout(function() {
    if (window[callbackName]) {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      IS_SYNCING = false;
    }
  }, 15000);
}

function sendToGScript() {
  const url = DB.settings.gscriptUrl;
  if (!url) { showToast("Lagre URL først", "error"); return; }

    return;
  }

  const script = document.createElement("script");
  const callbackName = "gscriptSendCallback_" + Date.now();

    } else {
      $("synkStatus").innerHTML = `<div style="color:#e94560;">❌ Send feilet</div>`;

    }
  };
  script.onerror = function() {
    delete window[callbackName];
    if (script.parentNode) script.parentNode.removeChild(script);
    $("synkStatus").innerHTML = `<div style="color:#e94560;">❌ Send feilet</div>`;
    showToast("Send feilet", "error");
  };
  script.src = url + "?action=write&data=" + encodeURIComponent(jsonData) + "&callback=" + callbackName;
  document.head.appendChild(script);
  setTimeout(function() {
    if (window[callbackName]) {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      $("synkStatus").innerHTML = `<div style="color:#e94560;">❌ Tidsavbrudd</div>`;
    }
  }, 15000);
}

function fetchFromGScript(silent) {
  var url = DB.settings.gscriptUrl;
  if (!url) { if (!silent) showToast("Lagre URL først", "error"); return; }
  if (!silent) $("synkStatus").innerHTML = `<div style="color:#3498db;">⏳ Henter data...</div>`;
  updateSyncIndicator("syncing");

  var script = document.createElement("script");
  var callbackName = "gscriptFetchCallback_" + Date.now();
  window[callbackName] = function(data) {
    delete window[callbackName];
    if (script.parentNode) script.parentNode.removeChild(script);
    if (data && data.success && data.data) {
      var rows = data.data;
      // Merge: Behold lokale data, oppdater med eksterne data
      var existingIds = new Set(DB.items.map(function(item) { return item.id; }));
      var newItems = [];
      for (var i = 1; i < rows.length; i++) {
        var r = rows[i];
        if (!r[0]) continue;
        var newItem = {
          id: r[0], qrId: r[1] || "", kar: r[2] || "", dato: r[3] || new Date().toISOString(),
          lager: r[4] || "Kjøpslager", lev: r[5] || "", storrelse: r[6] || "",
          brutto: parseFloat(r[7]) || 0, tara: parseFloat(r[8]) || 0, netto: parseFloat(r[9]) || 0,
          utDato: r[10] || null, userInn: r[11] || (currentUser ? currentUser.name : "")
        };
        // Hvis item finnes lokalt, oppdater den; ellers legg til
        var existingIndex = DB.items.findIndex(function(item) { return item.id === newItem.id; });
        if (existingIndex >= 0) {
          DB.items[existingIndex] = newItem; // Oppdater eksisterende
        } else {
          newItems.push(newItem); // Legg til som ny
        }
      }
      // Legg til nye items fra Google Sheets
      DB.items = DB.items.concat(newItems);
      saveDB();
      LAST_SYNC = new Date();
      updateSyncIndicator("ok");
      if (!silent) {
        $("synkStatus").innerHTML = `<div style="color:#0f9b6e;">✅ Importert ${rows.length - 1} rader!</div>`;
        showToast("Data hentet!");
      }
    } else {
      updateSyncIndicator("error");
      if (!silent) {
        $("synkStatus").innerHTML = `<div style="color:#e94560;">❌ Ingen data mottatt</div>`;
        showToast("Import feilet", "error");
      }
    }
    IS_SYNCING = false;
  };
  script.onerror = function() {
    delete window[callbackName];
    if (script.parentNode) script.parentNode.removeChild(script);
    updateSyncIndicator("error");
    if (!silent) {
      $("synkStatus").innerHTML = `<div style="color:#e94560;">❌ Hent feilet</div>`;
      showToast("Hent feilet", "error");
    }
    IS_SYNCING = false;
  };
  script.src = url + "?action=read&callback=" + callbackName;
  document.head.appendChild(script);
  setTimeout(function() {
    if (window[callbackName]) {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      updateSyncIndicator("error");
      if (!silent) $("synkStatus").innerHTML = `<div style="color:#e94560;">❌ Tidsavbrudd</div>`;
      IS_SYNCING = false;
    }
  }, 15000);
}

function exportCSV() {
  let csv = "ID;QR ID;Kar nr;Dato;Lager;Leverandør;Størrelse;Brutto;Tara;Netto;Ut dato;Registrert av\n";
  DB.items.forEach(i => {
    csv += i.id + ";" + (i.qrId || "") + ";" + (i.kar || "") + ";" + i.dato + ";" + i.lager + ";" + i.lev + ";" + i.storrelse + ";" + i.brutto + ";" + i.tara + ";" + i.netto + ";" + (i.utDato || "") + ";" + (i.userInn || "") + "\n";
  });
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "varelager.csv"; a.click(); URL.revokeObjectURL(url);
  showToast("CSV eksportert!");
}

function exportExcel() {
  let html = '\u003chtml xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">\u003chead><meta charset="UTF-8">\u003cstyle>table{border-collapse:collapse;}th,td{border:1px solid #000;padding:5px;}\u003c/style\u003e\u003c/head\u003e\u003cbody><table>';
  html += '<tr><th>ID</th><th>QR ID</th><th>Kar nr</th><th>Dato</th><th>Lager</th><th>Leverandør</th><th>Størrelse</th><th>Brutto</th><th>Tara</th><th>Netto</th><th>Ut dato</th><th>Registrert av</th></tr>';
  DB.items.forEach(i => {
    html += '<tr><td>' + i.id + '</td><td>' + (i.qrId || "") + '</td><td>' + (i.kar || "") + '</td><td>' + i.dato + '</td><td>' + i.lager + '</td><td>' + i.lev + '</td><td>' + i.storrelse + '</td><td>' + i.brutto + '</td><td>' + i.tara + '</td><td>' + i.netto + '</td><td>' + (i.utDato || "") + '</td><td>' + (i.userInn || "") + '</td></tr>';
  });
  html += '</table>\u003c/body\u003e\u003c/html\u003e';
  const blob = new Blob([html], { type: "application/vnd.ms-excel" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "varelager.xls"; a.click(); URL.revokeObjectURL(url);
  showToast("Excel eksportert!");
}

function exportPDF() {
  const items = DB.items.filter(i => i.lager !== "Produsert" && i.lager !== "Slettet");
  let totalNetto = 0, levSum = {};
  items.forEach(i => {
    totalNetto += i.netto;
    levSum[i.lev] = (levSum[i.lev] || 0) + i.netto;
  });

  let html = '\u003c!DOCTYPE html\u003e\u003chtml>\u003chead><meta charset="UTF-8"><title>Varelager Rapport</title>';
  html += '\u003cstyle>body{font-family:Arial,sans-serif;padding:20px;}h1{color:#333;}h2{color:#666;font-size:1.1rem;margin-top:20px;}';
  html += 'table{width:100%;border-collapse:collapse;margin-top:10px;font-size:0.9rem;}th,td{border:1px solid #333;padding:6px;text-align:left;}';
  html += 'th{background:#f0f0f0;font-weight:600;}tr:nth-child(even){background:#f9f9f9;}';
  html += '.sum-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #ddd;}';
  html += '.total{border-top:2px solid #333;font-weight:700;margin-top:5px;padding-top:8px;}';
  html += '.right{text-align:right;} .num{color:#0066cc;font-weight:600;}\u003c/style\u003e\u003c/head\u003e\u003cbody>';
  html += '<h1>📊 Varelager Rapport</h1><p style="color:#888;">Generert: ' + new Date().toLocaleString("no-NO") + '</p>';

  html += '<h2>Sum pr. leverandør</h2>';
  Object.entries(levSum).sort((a, b) => b[1] - a[1]).forEach(([lev, sum]) => {
    html += '<div class="sum-row"><span>' + lev + '</span><span class="num">' + formatNumber(sum) + ' kg</span></div>';
  });
  html += '<div class="sum-row total"><span>TOTALT</span><span class="num">' + formatNumber(totalNetto) + ' kg</span></div>';

  const uniqueKar = new Set();
  items.forEach(function(i) { var ks = i.kar ? String(i.kar) : ""; if (ks.trim() !== "") uniqueKar.add(ks.trim()); });
  html += '<h2>Palleliste (' + items.length + ' registreringer, ' + uniqueKar.size + ' unike)</h2>';
  html += '<table><thead><tr><th>QR ID</th><th>Størrelse</th><th>Netto</th><th>Leverandør</th><th>Dato</th><th>Døgn</th><th>Lager</th></tr></thead><tbody>';
  items.forEach(item => {
    const dogn = daysBetween(item.dato, new Date());
    html += '<tr><td>' + (item.qrId || "N/A") + '</td><td>' + item.storrelse + '</td><td>' + formatNumber(item.netto) + '</td><td>' + item.lev + '</td><td>' + formatDateNo(item.dato) + '</td><td>' + dogn + '</td><td>' + item.lager + '</td></tr>';
  });
  html += '</tbody></table>\u003c/body\u003e\u003c/html\u003e';

  const blob = new Blob([html], { type: "application/pdf" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "varelager_rapport.pdf"; a.click(); URL.revokeObjectURL(url);
  showToast("PDF eksportert!");
}

// ===================== INNSTILLINGER =====================
function renderInst(content) {
  content.innerHTML = `<div class="section"><div class="section-title">⚙️ Innstillinger</div>` +
    `<div class="btn-row" style="margin-bottom:15px;">` +
    `<button class="btn btn-secondary" onclick="showInstUsers()">👥 Brukere</button>` +
    `<button class="btn btn-secondary" onclick="showInstData()">💾 Data</button></div>` +
    `<div id="instContent"></div></div>`;
  showInstUsers();
}

function showInstUsers() {
  let html = `<div class="section"><div class="section-title">Brukere</div>` +
    `<table class="data-table"><thead><tr><th>Navn</th><th>Admin</th><th>Handling</th></tr></thead><tbody>`;
  DB.users.forEach(u => {
    html += `<tr><td>${u.name}</td><td>${u.isAdmin ? "Ja" : "Nei"}</td>` +
      `<td class="actions">${!u.isAdmin ? `<button class="del-btn" onclick="deleteUser(${u.id})">Slett</button>` : ''}</td></tr>`;
  });
  html += `</tbody></table></div>`;
  $("instContent").innerHTML = html;
}

function deleteUser(id) {
  const pass = prompt("Admin-passord:");
  if (pass !== CONFIG.ADMIN_PASS) { showToast("Feil passord", "error"); return; }
  DB.users = DB.users.filter(u => u.id !== id);
  saveDB(); showToast("Bruker slettet!"); showInstUsers();
}

function showInstData() {
  $("instContent").innerHTML = `<div class="section"><div class="section-title">Datahåndtering</div>` +
    `<div class="btn-row"><button class="btn btn-secondary" onclick="exportJSON()">📤 Eksporter JSON</button>` +
    `<button class="btn btn-secondary" onclick="importJSON()">📥 Importer JSON</button></div>` +
    `<div class="btn-row" style="margin-top:15px;"><button class="btn btn-danger" onclick="deleteAllData()">🗑️ Slett alle data</button></div></div>`;
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "varelager_backup.json"; a.click(); URL.revokeObjectURL(url);
  showToast("JSON eksportert!");
}

function importJSON() {
  const input = document.createElement("input"); input.type = "file"; input.accept = ".json";
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.users && data.items) { 
          DB = data; 
          if (DB.customLagre) LAGRE = DB.customLagre;
          if (DB.customLeverandorer) LEVERANDORER = DB.customLeverandorer;
          if (DB.customStorrelser) STORRELSER = DB.customStorrelser;
          saveDB(); showToast("Data importert!"); 
        }
        else { showToast("Ugyldig JSON-format", "error"); }
      } catch (err) { showToast("Kunne ikke lese fil", "error"); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function deleteAllData() {
  const pass = prompt("Admin-passord for å slette ALLE data:");
  if (pass !== CONFIG.ADMIN_PASS) { showToast("Feil passord", "error"); return; }
  if (!confirm("ER DU SIKKER? Alle data vil slettes permanent!")) return;
  DB.items = []; DB.users = DB.users.filter(u => u.isAdmin);
  saveDB(); showToast("Alle data slettet!"); showInstData();
}

// ===================== QR KODE =====================
function showQRCode(qrId, title) {
  const modal = document.createElement("div"); modal.className = "modal-overlay"; modal.id = "qrModal";
  modal.innerHTML = `<div class="modal-content" style="text-align:center;">` +
    `<div class="modal-header"><h2>${title}</h2><button class="modal-close" onclick="document.getElementById('qrModal').remove()">&times;</button></div>` +
    `<div id="qrCodeDisplay" style="padding:20px;"></div><p style="font-family:monospace;font-size:1.2rem;margin-top:10px;">${qrId}</p>` +
    `<button class="btn btn-secondary" onclick="document.getElementById('qrModal').remove()">Lukk</button></div>`;
  document.body.appendChild(modal);
  generateInlineQR(qrId, "qrCodeDisplay");
}

function generateInlineQR(text, containerId) {
  const container = document.getElementById(containerId); if (!container) return;
  const size = 200; const canvas = document.createElement("canvas"); canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d"); ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, size, size); ctx.fillStyle = "#000";
  const cellSize = Math.floor(size / 25); const seed = text.split("").reduce((a, c) => a + c.charCodeAt(0), 0);

  function drawFinder(x, y) {
    ctx.fillRect(x * cellSize, y * cellSize, 7 * cellSize, 7 * cellSize);
    ctx.fillStyle = "#fff"; ctx.fillRect((x + 1) * cellSize, (y + 1) * cellSize, 5 * cellSize, 5 * cellSize);
    ctx.fillStyle = "#000"; ctx.fillRect((x + 2) * cellSize, (y + 2) * cellSize, 3 * cellSize, 3 * cellSize);
  }
  drawFinder(0, 0); drawFinder(18, 0); drawFinder(0, 18);

  let rng = seed;
  for (let r = 0; r < 21; r++) {
    for (let c = 0; c < 21; c++) {
      if ((r < 7 && c < 7) || (r < 7 && c > 13) || (r > 13 && c < 7)) continue;
      rng = (rng * 9301 + 49297) % 233280;
      if (rng / 233280 > 0.5) { ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize); }
    }
  }
  ctx.fillStyle = "#000";
  for (let i = 8; i < 17; i++) { if (i % 2 === 0) { ctx.fillRect(i * cellSize, 6 * cellSize, cellSize, cellSize); ctx.fillRect(6 * cellSize, i * cellSize, cellSize, cellSize); } }
  container.appendChild(canvas);
}

// ===================== QR SCANNER =====================
function startQRScan() {
  const overlay = document.createElement("div"); overlay.className = "qr-overlay"; overlay.id = "qrOverlay";
  overlay.innerHTML = `<button class="close-btn" onclick="stopQRScan()">Lukk</button>` +
    `<video id="qrVideo" autoplay playsinline></video>` +
    `<div class="qr-manual"><p>QR-kode leses automatisk...</p>` +
    `<div class="form-group"><label>Eller tast inn manuelt:</label><input type="text" id="qrManualInput" placeholder="QR ID eller Kar nr"></div>` +
    `<button class="btn btn-primary" onclick="manualQRInput()">Søk</button></div>`;
  document.body.appendChild(overlay);

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => { const video = $("qrVideo"); video.srcObject = stream; qrScanner = stream; })
    .catch(() => { showToast("Kamera ikke tilgjengelig. Bruk manuell inntasting.", "info"); });
}

function stopQRScan() {
  if (qrScanner) { qrScanner.getTracks().forEach(t => t.stop()); qrScanner = null; }
  const overlay = $("qrOverlay"); if (overlay) overlay.remove();
}

function manualQRInput() {
  const val = $("qrManualInput").value.trim(); if (!val) return;
  stopQRScan(); processUt(val);
}

// ===================== MODAL =====================
function showModal(title, content) {
  const modal = document.createElement("div"); modal.className = "modal-overlay"; modal.id = "activeModal";
  modal.innerHTML = `<div class="modal-content"><div class="modal-header"><h2>${title}</h2><button class="modal-close" onclick="closeModal()">&times;</button></div>${content}</div>`;
  document.body.appendChild(modal);
}

function closeModal() {
  const modal = $("activeModal"); if (modal) modal.remove(); editingItem = null;
}
